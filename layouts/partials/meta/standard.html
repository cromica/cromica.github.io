{{- $meta := partial "meta/resolved.html" . -}}
<meta charset="utf-8">
<meta http-equiv="content-type" content="text/html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title itemprop="name">{{ $meta.pageTitle }}</title>
<meta property="og:title" content="{{ $meta.pageTitle }}" />
<meta name="twitter:title" content="{{ $meta.pageTitle }}" />
<meta itemprop="name" content="{{ $meta.pageTitle }}" />
<meta name="application-name" content="{{ $meta.pageTitle }}" />
<meta property="og:site_name" content="{{ .Site.Params.sitename }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:type" content="{{ if eq .Section "posts" }}article{{ else }}website{{ end }}" />

<meta name="description" content="{{ $meta.description }}">
<meta itemprop="description" content="{{ $meta.description }}" />
<meta property="og:description" content="{{ $meta.description }}" />
<meta name="twitter:description" content="{{ $meta.description }}" />
<meta name="twitter:card" content="{{ if $meta.image }}summary_large_image{{ else }}summary{{ end }}" />

<meta property="og:locale" content="{{ .Site.LanguageCode }}" />
<meta name="language" content="{{ .Site.LanguageCode }}" />
{{ range .AllTranslations }}
  <link rel="alternate" hreflang="{{ .Language.Lang }}" href="{{ .Permalink }}" title="{{ .Language.LanguageName }}" />
{{ end }}

{{- if $meta.image -}}
<meta itemprop="image" content="{{ $meta.image }}" />
<meta property="og:image" content="{{ $meta.image }}" />
<meta property="og:image:secure_url" content="{{ $meta.image }}" />
<meta property="og:image:alt" content="{{ $meta.imageAlt }}" />
<meta name="twitter:image" content="{{ $meta.image }}" />
<meta name="twitter:image:src" content="{{ $meta.image }}" />
<meta name="twitter:image:alt" content="{{ $meta.imageAlt }}" />
{{- with $meta.imageWidth }}
<meta property="og:image:width" content="{{ . }}" />
{{- end }}
{{- with $meta.imageHeight }}
<meta property="og:image:height" content="{{ . }}" />
{{- end }}
{{- end -}}
